<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WMS 365 Warehouse Login</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px} 
    .card{width:100%;max-width:420px;background:#111827;border:1px solid #334155;border-radius:16px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;font-size:28px} p{color:#94a3b8;line-height:1.5} label{display:block;margin:14px 0 6px;font-weight:700} input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #475569;background:#0b1220;color:#fff;box-sizing:border-box} button{width:100%;margin-top:18px;padding:12px 14px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer} .msg{margin-top:14px;font-size:14px;min-height:20px}.err{color:#fca5a5}.ok{color:#86efac}.small{font-size:12px;color:#94a3b8;margin-top:14px}
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <h1>WMS 365</h1>
    <p>Warehouse staff login required to access the internal app.</p>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="username" required>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
    <div class="msg" id="message"></div>
    <div class="small">Customer portal users should use the separate portal login page.</div>
  </form>
  <script>
    const form=document.getElementById('loginForm');
    const message=document.getElementById('message');
    fetch('/api/app/me').then(r=>r.ok?r.json():null).then(data=>{ if(data&&data.authenticated){ window.location.href='/'; } }).catch(()=>{});
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      message.className='msg';
      message.textContent='Signing in...';
      const payload={email:form.email.value.trim(), password:form.password.value};
      try{
        const res=await fetch('/api/app/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const data=await res.json().catch(()=>({}));
        if(!res.ok){ throw new Error(data.error||'Login failed.'); }
        message.className='msg ok';
        message.textContent='Login accepted. Opening warehouse app...';
        window.location.href='/';
      }catch(err){
        message.className='msg err';
        message.textContent=err.message||'Login failed.';
      }
    });
  </script>
</body>
</html>

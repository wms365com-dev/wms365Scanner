plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

def configuredBaseUrl = (project.findProperty("WMS365_BASE_URL") ?: "https://your-live-wms365-domain.com").toString().replaceAll("/+\$", "")
def configuredStartPath = (project.findProperty("WMS365_START_PATH") ?: "/mobile?mode=mobile").toString()
if (!configuredStartPath.startsWith("/")) {
    configuredStartPath = "/" + configuredStartPath
}

android {
    namespace "com.wms365.app"
    compileSdk 35

    defaultConfig {
        applicationId "com.wms365.app"
        minSdk 26
        targetSdk 35
        versionCode 31
        versionName "0.2.30"
        buildConfigField "String", "WMS365_BASE_URL", "\"${configuredBaseUrl}\""
        buildConfigField "String", "WMS365_START_PATH", "\"${configuredStartPath}\""
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    implementation "androidx.core:core:1.13.1"
    implementation "com.journeyapps:zxing-android-embedded:4.3.0"
    implementation "com.google.android.gms:play-services-mlkit-document-scanner:16.0.0"
    implementation "com.google.mlkit:text-recognition:16.0.1"
}

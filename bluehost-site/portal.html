<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,follow">
    <meta http-equiv="refresh" content="1.5; url=https://app.wms365.co/portal">
    <title>WMS365 Customer Portal</title>
    <link rel="icon" href="/marketing-logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/marketing.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f5f8fa;
        }
        .portal-forward {
            width: min(92vw, 620px);
            padding: 36px;
            border: 1px solid #dbe4ea;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 18px 45px rgba(25, 46, 63, 0.12);
            text-align: center;
        }
        .portal-forward img {
            width: 150px;
            height: auto;
            margin-bottom: 18px;
        }
        .portal-forward h1 {
            margin: 0 0 10px;
            color: #1f3446;
            font-size: clamp(28px, 5vw, 40px);
            line-height: 1.05;
        }
        .portal-forward p {
            color: #587084;
            font-size: 17px;
            margin: 0 0 24px;
        }
        .portal-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <main class="portal-forward">
        <img src="/marketing-logo.svg" alt="WMS365">
        <h1>Customer Portal</h1>
        <p>Opening the secure WMS365 customer portal.</p>
        <div class="portal-actions">
            <a class="btn btn-primary" href="/portal">Continue to Portal</a>
            <a class="btn btn-secondary" href="/">Back to WMS365</a>
        </div>
    </main>
</body>
</html>
